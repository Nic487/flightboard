; FlightBoard ESP32 firmware
; Target: any ESP32 dev board with a 128x64 SSD1306 OLED on I2C
; Tested boards: ESP32-WROOM-32, NodeMCU-32S, DevKitC v4

[env:esp32dev]
platform = espressif32@^6.6.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries:
;   - U8g2 drives the SSD1306 (excellent text rendering, scrolling, multiple fonts)
;   - ArduinoJson parses the adsb.lol response
;   - WiFiManager gives us the captive portal config page on first boot
;   - Preferences (built-in) persists settings to NVS flash
lib_deps =
    olikraus/U8g2@^2.35.30
    bblanchon/ArduinoJson@^7.0.4
    https://github.com/tzapu/WiFiManager.git#v2.0.17

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DCONFIG_ARDUHAL_LOG_COLORS=1

; If you don't have PlatformIO and want to use Arduino IDE instead,
; see firmware/ARDUINO_IDE.md
